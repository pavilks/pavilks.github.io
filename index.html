<!-- r01 -->
<!DOCTYPE html>
<html lang="lv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AlfaB Reklāma</title>

<link rel="stylesheet" href="r01.css?r01">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

</head>

<body>

<canvas id="bg3d"></canvas>

<header>

<div class="logo">AlfaB</div>

<nav>
<a href="#home">Sākums</a>
<a href="#services">Pakalpojumi</a>
<a href="#calc">Kalkulators</a>
<a href="#contact">Kontakti</a>
</nav>

</header>

<section id="home">

<h1>Reklāmas Baneri</h1>
<p>Izgatavošana un montāža visā Latvijā</p>

</section>

<section id="services">

<h2>Pakalpojumi</h2>

<p>
Reklāmas baneru druka  
Montāža  
Dizains
</p>

</section>

<section id="calc">

<h2>Banera kalkulators</h2>

<div class="calculator">

<input id="width" placeholder="Platums (m)">
<input id="height" placeholder="Augstums (m)">

<select id="install">
<option value="0">Bez montāžas</option>
<option value="30">Montāža +30€</option>
</select>

<button onclick="calculateBanner()">Aprēķināt</button>

<div id="result"></div>

</div>

</section>

<section id="contact">

<h2>Kontakti</h2>

<form id="contactForm">

<input placeholder="Vārds">
<input placeholder="E-pasts">

<textarea placeholder="Ziņa"></textarea>

<button type="submit">Sūtīt</button>

</form>

</section>

<!-- CHAT BUTTON -->

<div id="chatButton">
💬
</div>


<!-- CHAT WINDOW -->

<div id="chat">

<div id="chatHeader">
AlfaB asistents
</div>

<div id="chatMessages">

<div class="bot">
Sveiki 👋  
Es esmu AlfaB asistents.  
Varu palīdzēt ar baneru cenu vai montāžu.
</div>

</div>

<div id="chatInput">

<input id="msg" placeholder="Uzdod jautājumu...">

<button id="sendBtn">
➤
</button>

</div>

</div>



<!-- WHATSAPP -->

<div id="whatsappButton">

<button onclick="openWhatsApp()">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

</button>

</div>


<script src="r01.js?r01"></script>

</body>
</html>
